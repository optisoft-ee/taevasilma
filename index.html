<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Taevasilma – est 2012">
  <title>Taevasilma</title>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100;300&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #cceab8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Josefin Sans', sans-serif;
      overflow: hidden;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 1.8s ease both;
    }

    .flower-svg {
      width: min(280px, 48vw);
      height: auto;
    }

    .name {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 100;
      font-size: clamp(2.6rem, 7.5vw, 5.2rem);
      letter-spacing: 0.08em;
      color: #2c5f52;
      line-height: 1;
      margin-top: 0.15em;
    }

    .est {
      font-family: 'Dancing Script', cursive;
      font-weight: 500;
      font-size: clamp(1.3rem, 3.8vw, 2.4rem);
      color: #2c5f52;
      margin-top: 0.3em;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-1deg);   }
      50%       { transform: rotate(0.9deg); }
    }

    .flower-g {
      animation: sway 5s ease-in-out infinite;
      transform-origin: 100px 380px;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.9; }
    }
    .petals { animation: shimmer 4s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="logo-wrap">

    <svg class="flower-svg" viewBox="0 0 200 420" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Single petal shape: centered above origin, to be rotated -->
        <path id="petal"
              d="M0,-68 C10,-58 12,-38 0,-28 C-12,-38 -10,-58 0,-68"
              fill="#f5c83a" stroke="#2c5f52" stroke-width="2.8"
              stroke-linejoin="round" stroke-linecap="round"/>
      </defs>

      <g class="flower-g">

        <!-- Stem: connects flower base (100,152) down to (100,390) with gentle curve -->
        <path d="M100 152 C102 200, 98 260, 100 310 C101 340, 103 365, 100 390"
              stroke="#2c5f52" stroke-width="4.5" stroke-linecap="round" fill="none"/>

        <!-- Leaf on the left side of stem -->
        <path d="M99 280 C84 266, 66 255, 56 240 C68 248, 86 260, 98 272"
              stroke="#2c5f52" stroke-width="3" stroke-linecap="round"
              fill="#5cb84a"/>

        <!-- Bud / base shape at bottom of stem -->
        <ellipse cx="100" cy="393" rx="5" ry="8" fill="#2c5f52" opacity="0.5"/>

        <!-- 10 petals rotated around center (100, 100) -->
        <g class="petals" transform="translate(100,100)">
          <use href="#petal" transform="rotate(0)"/>
          <use href="#petal" transform="rotate(36)"/>
          <use href="#petal" transform="rotate(72)"/>
          <use href="#petal" transform="rotate(108)"/>
          <use href="#petal" transform="rotate(144)"/>
          <use href="#petal" transform="rotate(180)"/>
          <use href="#petal" transform="rotate(216)"/>
          <use href="#petal" transform="rotate(252)"/>
          <use href="#petal" transform="rotate(288)"/>
          <use href="#petal" transform="rotate(324)"/>
        </g>

        <!-- Center disc -->
        <circle cx="100" cy="100" r="30" fill="#f5c83a" stroke="#2c5f52" stroke-width="3"/>
        <circle cx="100" cy="100" r="16" fill="#f0b820" stroke="#2c5f52" stroke-width="2"/>

      </g>
    </svg>

    <span class="name">Taevasilma</span>
    <span class="est">est 2012</span>

  </div>
</body>
</html>
