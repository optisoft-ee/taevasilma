<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Taevasilma – est 2012">
  <title>Taevasilma</title>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100;300&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #cceab8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Josefin Sans', sans-serif;
      overflow: hidden;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 1.8s ease both;
    }

    .flower-svg {
      width: min(140px, 24vw);
      height: auto;
    }

    .name {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 100;
      font-size: clamp(1.3rem, 3.75vw, 2.6rem);
      letter-spacing: 0.08em;
      color: #2c5f52;
      line-height: 1;
      margin-top: 0.15em;
    }

    .est {
      font-family: 'Dancing Script', cursive;
      font-weight: 500;
      font-size: clamp(0.65rem, 1.9vw, 1.2rem);
      color: #2c5f52;
      margin-top: 0.25em;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-1deg);   }
      50%       { transform: rotate(0.9deg); }
    }

    .flower-g {
      animation: sway 5s ease-in-out infinite;
      transform-origin: 100px 380px;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.9; }
    }
    .petals { animation: shimmer 4s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="logo-wrap">

    <svg class="flower-svg" viewBox="0 0 200 420" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Wide rounded petal matching reference logo -->
        <path id="petal"
              d="M0,-72 C28,-60 30,-28 0,-18 C-30,-28 -28,-60 0,-72"
              fill="#f5c83a" stroke="#2c5f52" stroke-width="2.6"
              stroke-linejoin="round" stroke-linecap="round"/>
      </defs>

      <g class="flower-g">

        <!-- Stem -->
        <path d="M100 148 C102 195, 97 258, 100 308 C102 340, 104 362, 100 390"
              stroke="#2c5f52" stroke-width="4.2" stroke-linecap="round" fill="none"/>

        <!-- Leaf: filled teardrop pointing lower-left -->
        <path d="M98 278 C82 262, 60 250, 50 234 C64 244, 84 258, 97 270"
              fill="#5cb84a" stroke="#2c5f52" stroke-width="2.8"
              stroke-linecap="round" stroke-linejoin="round"/>

        <!-- Stem-bottom bud oval -->
        <ellipse cx="100" cy="393" rx="5" ry="9"
                 fill="none" stroke="#2c5f52" stroke-width="2.5"/>

        <!-- Yellow halo disc behind petals -->
        <circle cx="100" cy="100" r="54" fill="#f5c83a" stroke="none"/>

        <!-- 10 petals rotated around center -->
        <g class="petals" transform="translate(100,100)">
          <use href="#petal" transform="rotate(0)"/>
          <use href="#petal" transform="rotate(36)"/>
          <use href="#petal" transform="rotate(72)"/>
          <use href="#petal" transform="rotate(108)"/>
          <use href="#petal" transform="rotate(144)"/>
          <use href="#petal" transform="rotate(180)"/>
          <use href="#petal" transform="rotate(216)"/>
          <use href="#petal" transform="rotate(252)"/>
          <use href="#petal" transform="rotate(288)"/>
          <use href="#petal" transform="rotate(324)"/>
        </g>

        <!-- Center disc -->
        <circle cx="100" cy="100" r="28" fill="#f5c83a" stroke="#2c5f52" stroke-width="3"/>
        <circle cx="100" cy="100" r="14" fill="#f0b820" stroke="#2c5f52" stroke-width="2"/>

      </g>
    </svg>

    <span class="name">Taevasilma</span>
    <span class="est">est 2012</span>

  </div>
</body>
</html>
