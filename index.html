<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Taevasilma – est 2012">
  <title>Taevasilma</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100;300&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #cceab8;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 1.8s ease both;
    }

    .flower-img {
      width: min(140px, 24vw);
      height: auto;
      mix-blend-mode: multiply;
      animation: sway 5s ease-in-out infinite;
      transform-origin: 52% 100%;
    }

    .name {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 100;
      font-size: clamp(1.3rem, 3.75vw, 2.6rem);
      letter-spacing: 0.08em;
      color: #2c5f52;
      line-height: 1;
      margin-top: 0.2em;
    }

    .est {
      font-family: 'Dancing Script', cursive;
      font-weight: 500;
      font-size: clamp(0.65rem, 1.9vw, 1.2rem);
      color: #2c5f52;
      margin-top: 0.25em;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-1.5deg); }
      50%       { transform: rotate(1.2deg);  }
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <img class="flower-img" src="image.png" alt="Taevasilma lill">
    <span class="name">Taevasilma</span>
    <span class="est">est 2012</span>
  </div>
</body>
</html>
