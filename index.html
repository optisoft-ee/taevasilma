<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Taevasilma – est 2012">
  <title>Taevasilma</title>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100;300&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #cceab8;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 1.8s ease both;
    }

    .flower-svg {
      width: min(140px, 24vw);
      height: auto;
    }

    .name {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 100;
      font-size: clamp(1.3rem, 3.75vw, 2.6rem);
      letter-spacing: 0.08em;
      color: #2c5f52;
      line-height: 1;
      margin-top: 0.2em;
    }

    .est {
      font-family: 'Dancing Script', cursive;
      font-weight: 500;
      font-size: clamp(0.65rem, 1.9vw, 1.2rem);
      color: #2c5f52;
      margin-top: 0.25em;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-1deg);   }
      50%       { transform: rotate(0.9deg); }
    }
    .flower-g {
      animation: sway 5s ease-in-out infinite;
      transform-origin: 100px 465px;
    }
  </style>
</head>
<body>
  <div class="logo-wrap">

    <!--
      viewBox: 200 × 500
      Flower centre: (100, 108)
      Spindle loop: top (100,188) → bottom tip (100,478)
      Leaf attachment: ~(100, 300)
    -->
    <svg class="flower-svg" viewBox="0 0 200 500" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!--
          Petal: drawn as a closed teardrop loop.
          Fill = same yellow as halo → appears as outline-only loop.
          Origin at (0,0) = flower centre; tip points upward.
        -->
        <path id="petal"
          d="M0,-10 C-20,-26 -22,-68 0,-86 C22,-68 20,-26 0,-10 Z"
          fill="#f5c83a"
          stroke="#2c5f52" stroke-width="5.8"
          stroke-linejoin="round" stroke-linecap="round"/>
      </defs>

      <g class="flower-g">

        <!-- ── STEM: straight segment ──────────────────────────── -->
        <path d="M100 184 C101 212, 99 248, 100 282"
              fill="none" stroke="#2c5f52" stroke-width="5.8" stroke-linecap="round"/>

        <!-- ── SPINDLE LOOP at bottom of stem ─────────────────── -->
        <path d="M100 282 C120 314, 122 428, 100 478
                 C78  428,  78  314, 100 282 Z"
              fill="none" stroke="#2c5f52" stroke-width="5.8"
              stroke-linejoin="round" stroke-linecap="round"/>

        <!-- ── LEAF ───────────────────────────────────────────── -->
        <!-- outer shape: teardrop pointing lower-left -->
        <path d="M98 302 C80 284, 48 278, 36 308
                 C48 340, 84 340, 98 316 Z"
              fill="#5cb84a" stroke="#2c5f52" stroke-width="5.5"
              stroke-linejoin="round" stroke-linecap="round"/>
        <!-- leaf vein -->
        <line x1="97" y1="315" x2="38" y2="309"
              stroke="#2c5f52" stroke-width="2.8" stroke-linecap="round"/>

        <!-- ── FLOWER HEAD ─────────────────────────────────────── -->
        <!-- yellow halo disc -->
        <circle cx="100" cy="108" r="74" fill="#f5c83a"/>

        <!-- 10 petal loops -->
        <g transform="translate(100,108)">
          <use href="#petal" transform="rotate(0)"/>
          <use href="#petal" transform="rotate(36)"/>
          <use href="#petal" transform="rotate(72)"/>
          <use href="#petal" transform="rotate(108)"/>
          <use href="#petal" transform="rotate(144)"/>
          <use href="#petal" transform="rotate(180)"/>
          <use href="#petal" transform="rotate(216)"/>
          <use href="#petal" transform="rotate(252)"/>
          <use href="#petal" transform="rotate(288)"/>
          <use href="#petal" transform="rotate(324)"/>
        </g>

        <!-- radial spokes in centre (8 spokes, 45° apart) -->
        <g transform="translate(100,108)" stroke="#2c5f52" stroke-width="4" stroke-linecap="round">
          <line x1="0" y1="-28" x2="0"   y2="-56" transform="rotate(0)"/>
          <line x1="0" y1="-28" x2="0"   y2="-56" transform="rotate(45)"/>
          <line x1="0" y1="-28" x2="0"   y2="-56" transform="rotate(90)"/>
          <line x1="0" y1="-28" x2="0"   y2="-56" transform="rotate(135)"/>
          <line x1="0" y1="-28" x2="0"   y2="-56" transform="rotate(180)"/>
          <line x1="0" y1="-28" x2="0"   y2="-56" transform="rotate(225)"/>
          <line x1="0" y1="-28" x2="0"   y2="-56" transform="rotate(270)"/>
          <line x1="0" y1="-28" x2="0"   y2="-56" transform="rotate(315)"/>
        </g>

        <!-- centre outer ring -->
        <circle cx="100" cy="108" r="28"
                fill="#f5c83a" stroke="#2c5f52" stroke-width="5.5"/>
        <!-- centre inner ring -->
        <circle cx="100" cy="108" r="14"
                fill="#f5c83a" stroke="#2c5f52" stroke-width="4"/>

      </g>
    </svg>

    <span class="name">Taevasilma</span>
    <span class="est">est 2012</span>

  </div>
</body>
</html>
