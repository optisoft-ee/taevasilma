<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Taevasilm – Loobu loodus">
  <title>Taevasilm</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #030812; }
    canvas { display: block; }

    #tip {
      position: fixed;
      pointer-events: none;
      font-family: 'Cormorant Garamond', serif;
      color: #fff;
      background: rgba(15, 22, 40, 0.48);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 18px;
      padding: 18px 22px;
      min-width: 172px;
      opacity: 0;
      transform: translateY(7px);
      transition: opacity 0.32s ease, transform 0.32s ease;
    }
    #tip.on { opacity: 1; transform: translateY(0); }

    #tip-temp {
      display: block;
      font-size: 44px;
      font-weight: 300;
      letter-spacing: -2px;
      line-height: 1;
      text-shadow: 0 2px 14px rgba(0,0,0,0.55);
    }
    #tip-desc {
      font-style: italic;
      font-size: 16px;
      margin-top: 5px;
      opacity: 0.87;
    }
    #tip-meta {
      font-size: 12px;
      font-weight: 300;
      margin-top: 10px;
      opacity: 0.58;
      line-height: 1.75;
    }

    #lbl {
      position: fixed;
      bottom: 22px;
      left: 26px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.26);
      letter-spacing: 0.4px;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div id="tip">
    <span id="tip-temp">–</span>
    <div id="tip-desc">laadin…</div>
    <div id="tip-meta"></div>
  </div>

  <div id="lbl">taevasilm.ee &middot; Loobu</div>

  <script>
  (() => {
    'use strict';

    // ── Canvas ────────────────────────────────────────────────────
    const cvs = document.getElementById('c');
    const ctx = cvs.getContext('2d');
    const tip = document.getElementById('tip');

    let W, H, HORIZON, MEADOW;
    let tick = 0;
    let mx = -9999, my = -9999;
    let trees = [], flowers = [], clouds = [], stars = [];

    // ── Utils ─────────────────────────────────────────────────────
    const rnd   = (a, b) => a + Math.random() * (b - a);
    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

    // ── Resize ────────────────────────────────────────────────────
    function resize() {
      W = cvs.width  = window.innerWidth;
      H = cvs.height = window.innerHeight;
      HORIZON = H * 0.50;
      MEADOW  = H * 0.56;
      initScene();
    }
    window.addEventListener('resize', resize);

    // ── Time helpers ──────────────────────────────────────────────
    function nowH() {
      const d = new Date();
      return d.getHours() + d.getMinutes() / 60 + d.getSeconds() / 3600;
    }

    // Approx. Estonian sunrise/sunset by month (talv → suvi → talv)
    const DAYLIMITS = [
      [9,15],[8,17],[7,18],[6,20],[5,21],[4,22],
      [5,22],[6,21],[7,20],[8,18],[8,16],[9,15]
    ];
    function getDL() { return DAYLIMITS[new Date().getMonth()]; }

    // ── Open-Meteo – Loobu ────────────────────────────────────────
    const WMO = {
      0:'Selge',1:'Peamiselt selge',2:'Osaliselt pilves',3:'Pilves',
      45:'Udu',48:'Härmatisudu',
      51:'Kerge uduvihm',53:'Uduvihm',55:'Tihe uduvihm',
      61:'Kerge vihm',63:'Vihm',65:'Tugev vihm',
      71:'Kerge lumi',73:'Lumi',75:'Tugev lumi',
      80:'Vihmahoog',81:'Vihmahoogud',82:'Tugev vihmahoog',
      95:'Äike',96:'Äike rahega',99:'Tugev äike'
    };

    async function loadWeather() {
      try {
        const r = await fetch(
          'https://api.open-meteo.com/v1/forecast' +
          '?latitude=59.5167&longitude=25.9667' +
          '&current=temperature_2m,weathercode,windspeed_10m,relative_humidity_2m' +
          '&timezone=Europe%2FTallinn'
        );
        const j = await r.json();
        const c = j.current;
        document.getElementById('tip-temp').textContent =
          Math.round(c.temperature_2m) + '°C';
        document.getElementById('tip-desc').textContent =
          WMO[c.weathercode] ?? '–';
        document.getElementById('tip-meta').innerHTML =
          'Tuul ' + Math.round(c.windspeed_10m) + ' km/h<br>' +
          'Niiskus ' + Math.round(c.relative_humidity_2m) + '%';
      } catch {
        document.getElementById('tip-desc').textContent = 'Ilmainfo pole saadaval';
      }
    }
    loadWeather();
    setInterval(loadWeather, 600_000);

    // ── Scene init ────────────────────────────────────────────────
    function initScene() {
      // Tree layout: type, x-fraction, scale
      const specs = [
        // Tagumine rida – väiksemad, kaugem
        {t:'spruce',x:0.03,s:0.46},{t:'birch', x:0.10,s:0.43},
        {t:'spruce',x:0.17,s:0.49},{t:'pine',  x:0.25,s:0.45},
        {t:'birch', x:0.32,s:0.42},{t:'spruce',x:0.39,s:0.47},
        {t:'pine',  x:0.48,s:0.44},{t:'birch', x:0.56,s:0.41},
        {t:'spruce',x:0.63,s:0.50},{t:'pine',  x:0.71,s:0.46},
        {t:'spruce',x:0.79,s:0.48},{t:'birch', x:0.87,s:0.43},
        {t:'pine',  x:0.94,s:0.47},{t:'spruce',x:0.99,s:0.45},
        // Eesmine rida – suuremad, lähemal
        {t:'pine',  x:0.07,s:0.82},{t:'spruce',x:0.20,s:0.90},
        {t:'birch', x:0.34,s:0.80},{t:'spruce',x:0.46,s:0.76},
        {t:'birch', x:0.58,s:0.84},{t:'pine',  x:0.71,s:0.88},
        {t:'spruce',x:0.83,s:0.92},{t:'birch', x:0.92,s:0.79},
      ];

      trees = specs.map((s, i) => ({
        type: s.t,
        x: s.x * W,
        y: s.s < 0.55 ? HORIZON + 4 : HORIZON + H * 0.035,
        sc: s.s,
        ph: i * 0.71
      }));

      flowers = Array.from({length: 80}, () => ({
        x: rnd(0, W),
        y: rnd(MEADOW + 8, H - 28),
        n:  Math.ceil(rnd(2, 5)),
        sh: rnd(14, 32),
        sz: rnd(2.5, 5.0),
        ph: rnd(0, Math.PI * 2)
      }));

      clouds = Array.from({length: 7}, () => ({
        x:   rnd(-80, W + 80),
        y:   rnd(H * 0.04, H * 0.30),
        r:   rnd(30, 68),
        spd: rnd(0.07, 0.24),
        al:  rnd(0.40, 0.78)
      }));

      stars = Array.from({length: 160}, () => ({
        x:  rnd(0, W),
        y:  rnd(0, HORIZON * 0.90),
        r:  rnd(0.4, 1.9),
        ph: rnd(0, Math.PI * 2)
      }));
    }

    // ── Sky gradient ──────────────────────────────────────────────
    function drawSky(h, sr, ss) {
      let top, mid, bot;
      if      (h < sr - 0.8)      { top='#020510'; mid='#060E1C'; bot='#0D1830'; }
      else if (h < sr)             { top='#120622'; mid='#3A1808'; bot='#703020'; }
      else if (h < sr + 1.5)      { top='#1A0930'; mid='#8B3020'; bot='#F08040'; }
      else if (h < sr + 3.0)      { top='#1558A8'; mid='#4A9FD4'; bot='#96D0F0'; }
      else if (h < ss - 2.0)      { top='#1060C0'; mid='#2090E8'; bot='#80CEFC'; }
      else if (h < ss - 0.5)      { top='#1A0840'; mid='#8A2C6A'; bot='#E86030'; }
      else if (h < ss + 0.8)      { top='#0D0828'; mid='#181040'; bot='#28184A'; }
      else                        { top='#020510'; mid='#060E1C'; bot='#0D1830'; }

      const g = ctx.createLinearGradient(0, 0, 0, HORIZON);
      g.addColorStop(0,    top);
      g.addColorStop(0.55, mid);
      g.addColorStop(1,    bot);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, HORIZON + 4);
    }

    // ── Tähed ─────────────────────────────────────────────────────
    function drawStars(h, sr, ss) {
      let a = 0;
      if   (h < sr - 0.8 || h >= ss + 0.8) a = 1;
      else if (h < sr)  a = 1 - clamp((h - (sr - 0.8)) / 0.8, 0, 1);
      else if (h >= ss) a = clamp((h - ss) / 0.8, 0, 1);
      if (a <= 0) return;

      ctx.save();
      for (const s of stars) {
        const tw = 0.55 + 0.45 * Math.sin(tick * 1.5 + s.ph);
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${(a * tw).toFixed(2)})`;
        ctx.fill();
      }
      ctx.restore();
    }

    // ── Pilved ────────────────────────────────────────────────────
    function drawClouds(h, sr, ss) {
      const day = h >= sr && h < ss;
      for (const cl of clouds) {
        cl.x += cl.spd * 0.5;
        if (cl.x > W + cl.r * 3.5) cl.x = -cl.r * 3.5;

        ctx.save();
        ctx.globalAlpha = (day ? 1 : 0.18) * cl.al;
        ctx.fillStyle = day ? '#FFFFFF' : 'rgba(180,190,220,1)';
        const {x, y, r} = cl;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.arc(x + r * 0.85, y - r * 0.18, r * 0.72, 0, Math.PI * 2);
        ctx.arc(x - r * 0.55, y + r * 0.05, r * 0.62, 0, Math.PI * 2);
        ctx.arc(x + r * 1.55, y + r * 0.08, r * 0.50, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // ── Taevakeha asukohad ────────────────────────────────────────
    function celestPos(isDay, h, sr, ss) {
      const padX = W * 0.08;
      const arcH = HORIZON * 0.72;
      let t;
      if (isDay) {
        t = clamp((h - sr) / (ss - sr), 0, 1);
      } else {
        const nightLen = 24 - ss + sr;
        t = clamp((h >= ss ? h - ss : h + 24 - ss) / nightLen, 0, 1);
      }
      return {
        x: padX + t * (W - 2 * padX),
        y: HORIZON - arcH * Math.sin(t * Math.PI),
        t
      };
    }

    // ── Päike ─────────────────────────────────────────────────────
    let sunHov = false;

    function drawSun(h, sr, ss) {
      const {x, y} = celestPos(true, h, sr, ss);
      const r = sunHov ? 26 : 21;

      ctx.save();

      // Atmosfääriline sära
      const glow = ctx.createRadialGradient(x, y, r, x, y, r * 5.5);
      glow.addColorStop(0,   'rgba(255,220,60,0.32)');
      glow.addColorStop(0.4, 'rgba(255,180,0,0.12)');
      glow.addColorStop(1,   'rgba(255,120,0,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(x, y, r * 5.5, 0, Math.PI * 2);
      ctx.fill();

      // Kiired
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(tick * 0.07);
      for (let i = 0; i < 12; i++) {
        const a   = (i / 12) * Math.PI * 2;
        const lng = i % 3 === 0;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * (r + 4),  Math.sin(a) * (r + 4));
        ctx.lineTo(Math.cos(a) * (r + (lng ? 18 : 11)), Math.sin(a) * (r + (lng ? 18 : 11)));
        ctx.strokeStyle = `rgba(255,205,0,${lng ? 0.7 : 0.4})`;
        ctx.lineWidth   = lng ? 2.0 : 1.2;
        ctx.lineCap     = 'round';
        ctx.stroke();
      }
      ctx.restore();

      // Päikese ketas
      const disk = ctx.createRadialGradient(x - r * 0.35, y - r * 0.35, 0, x, y, r);
      disk.addColorStop(0,    '#FFFDE7');
      disk.addColorStop(0.55, '#FFD740');
      disk.addColorStop(1,    '#FF8F00');
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = disk;
      ctx.fill();

      ctx.restore();
    }

    // ── Kuu ───────────────────────────────────────────────────────
    let moonHov = false;

    function drawMoon(h, sr, ss) {
      const {x, y} = celestPos(false, h, sr, ss);
      const r = moonHov ? 22 : 18;

      ctx.save();

      // Lunaarpaiste
      const halo = ctx.createRadialGradient(x, y, r * 0.8, x, y, r * 4.2);
      halo.addColorStop(0, 'rgba(180,200,255,0.22)');
      halo.addColorStop(1, 'rgba(100,140,255,0)');
      ctx.fillStyle = halo;
      ctx.beginPath();
      ctx.arc(x, y, r * 4.2, 0, Math.PI * 2);
      ctx.fill();

      // Kuu ketas
      const disk = ctx.createRadialGradient(x - r * 0.25, y - r * 0.25, 0, x, y, r);
      disk.addColorStop(0,   '#FFFEF8');
      disk.addColorStop(0.6, '#F0EAC8');
      disk.addColorStop(1,   '#C8BE98');
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = disk;
      ctx.fill();

      // Poolkuu vari
      const shadow = ctx.createRadialGradient(x + r * 0.5, y - r * 0.1, 0, x + r * 0.5, y, r * 1.25);
      shadow.addColorStop(0,   'rgba(4,8,22,0.74)');
      shadow.addColorStop(0.5, 'rgba(4,8,22,0.40)');
      shadow.addColorStop(1,   'rgba(4,8,22,0)');
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = shadow;
      ctx.fill();

      // Kraatrid
      ctx.save();
      ctx.globalAlpha = 0.11;
      ctx.fillStyle   = '#806A40';
      [[-r*0.25,-r*0.15,r*0.18],[r*0.15,r*0.25,r*0.12],[-r*0.1,r*0.3,r*0.09]].forEach(([cx2,cy2,cr]) => {
        ctx.beginPath();
        ctx.arc(x + cx2, y + cy2, cr, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.restore();

      ctx.restore();
    }

    // ── Kaugete puude siluett ─────────────────────────────────────
    function drawTreeline(h, sr, ss) {
      const night = h < sr || h >= ss;
      ctx.save();
      ctx.fillStyle = night ? 'rgba(2,6,1,0.88)' : 'rgba(25,52,10,0.42)';
      ctx.beginPath();
      ctx.moveTo(0, HORIZON + 10);
      for (let px = 0; px <= W; px += 10) {
        const ht = 20 + 14 * Math.sin(px * 0.024)
                      +  9 * Math.sin(px * 0.068 + 0.9)
                      +  6 * Math.sin(px * 0.14  + 2.0);
        ctx.lineTo(px, HORIZON - ht);
      }
      ctx.lineTo(W, HORIZON + 10);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    // ── Aasamaastik ───────────────────────────────────────────────
    function drawGround(h, sr, ss) {
      const night = h < sr || h >= ss;
      const g = ctx.createLinearGradient(0, HORIZON, 0, H);
      if (!night) {
        g.addColorStop(0,    '#50882A');
        g.addColorStop(0.25, '#3D7020');
        g.addColorStop(1,    '#284E10');
      } else {
        g.addColorStop(0, '#162A0C');
        g.addColorStop(1, '#080F04');
      }

      ctx.beginPath();
      ctx.moveTo(0, H);
      ctx.lineTo(0, HORIZON + 14);
      ctx.bezierCurveTo(W*0.18, HORIZON - 10, W*0.32, HORIZON + 20, W*0.50, HORIZON + 8);
      ctx.bezierCurveTo(W*0.68, HORIZON - 8,  W*0.83, HORIZON + 16, W,      HORIZON + 6);
      ctx.lineTo(W, H);
      ctx.closePath();
      ctx.fillStyle = g;
      ctx.fill();
    }

    // ── Kuusk ─────────────────────────────────────────────────────
    function drawSpruce(x, y, sc, ph, night) {
      const TH   = 140 * sc;
      const sway = Math.sin(tick * 0.44 + ph) * 2.5 * sc;

      ctx.save();
      ctx.translate(x, y);

      // Tüvi
      ctx.fillStyle = night ? '#22120A' : '#58381C';
      ctx.fillRect(-2.5 * sc, -TH * 0.09, 5 * sc, TH * 0.12);

      const dark  = night ? 'rgba(8,18,4,0.85)'  : 'rgba(25,58,10,0.88)';
      const light = night ? 'rgba(12,26,6,0.70)'  : 'rgba(38,78,16,0.72)';

      // 5 korrust alt üles (joonista alt esimesena)
      for (let i = 4; i >= 0; i--) {
        const p  = i / 4;   // 0 = ülemine, 1 = alumine
        const sw = sway * p;
        const bw = TH * 0.30 * (0.28 + (1 - p) * 0.72);
        const by = -TH * (0.08 + p * 0.82);
        const bh = TH * 0.23;

        ctx.beginPath();
        ctx.moveTo(sw, by - bh * 0.88);
        ctx.bezierCurveTo(sw + bw*0.45, by - bh*0.28, sw + bw, by + bh*0.18, sw, by + bh*0.08);
        ctx.bezierCurveTo(sw - bw, by + bh*0.18, sw - bw*0.45, by - bh*0.28, sw, by - bh*0.88);
        ctx.fillStyle = p < 0.5 ? dark : light;
        ctx.fill();
      }

      ctx.restore();
    }

    // ── Kask ──────────────────────────────────────────────────────
    function drawBirch(x, y, sc, ph, night) {
      const TH   = 158 * sc;
      const sway = Math.sin(tick * 0.55 + ph) * 3.2 * sc;

      ctx.save();
      ctx.translate(x, y);

      // Tüvi
      ctx.lineWidth   = 5.5 * sc;
      ctx.lineCap     = 'round';
      ctx.strokeStyle = night ? '#88847A' : '#E2DDD0';
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(sway*0.22, -TH*0.33, sway*0.55, -TH*0.64, sway*0.82, -TH*0.87);
      ctx.stroke();

      // Kasekoore mustrid
      ctx.strokeStyle = 'rgba(40,30,18,0.38)';
      ctx.lineWidth   = 1.8;
      for (let i = 0; i < 5; i++) {
        const my = -TH * (0.10 + i * 0.15);
        const mx =  sway * (i * 0.15);
        ctx.beginPath();
        ctx.moveTo(mx - 3.5 * sc, my);
        ctx.lineTo(mx + 3.5 * sc, my);
        ctx.stroke();
      }

      // Võra (4 ringikest)
      const cx = sway * 0.82, cy = -TH * 0.87, cr = 30 * sc;
      const greens = night
        ? ['rgba(14,34,7,0.82)','rgba(10,28,5,0.74)','rgba(18,42,9,0.68)','rgba(12,32,6,0.72)']
        : ['rgba(88,150,48,0.68)','rgba(72,138,36,0.60)','rgba(102,165,56,0.54)','rgba(80,145,44,0.58)'];

      [[0,0,1.0],[cr*0.55,-cr*0.3,0.82],[-cr*0.5,-cr*0.25,0.78],[cr*0.18,-cr*0.55,0.70]].forEach(([ox,oy,sz],i) => {
        ctx.beginPath();
        ctx.arc(cx + ox, cy + oy, cr * sz, 0, Math.PI * 2);
        ctx.fillStyle = greens[i];
        ctx.fill();
      });

      ctx.restore();
    }

    // ── Mänd ──────────────────────────────────────────────────────
    function drawPine(x, y, sc, ph, night) {
      const TH   = 172 * sc;
      const sway = Math.sin(tick * 0.38 + ph) * 2.2 * sc;

      ctx.save();
      ctx.translate(x, y);

      // Pikk punakaspruun tüvi
      ctx.fillStyle = night ? '#2C1A0C' : '#8B5E38';
      const tw = 4 * sc;
      ctx.beginPath();
      ctx.moveTo(-tw, 2);
      ctx.lineTo( tw, 2);
      ctx.lineTo( tw + sway * 0.25, -TH * 0.68);
      ctx.lineTo(-tw + sway * 0.25, -TH * 0.68);
      ctx.closePath();
      ctx.fill();

      // Võra – vihmavarjulaadne (mändi iseloom)
      const tx = sway * 0.4;
      const ty = -TH * 0.67;
      const cw = 43 * sc, ch = 25 * sc;

      const c0 = night ? '#0C1E06' : '#2A4E16';
      const c1 = night ? '#142808' : '#386822';
      const c2 = night ? '#1C3A0C' : '#4A8030';

      // Lai alumine kiht
      ctx.beginPath();
      ctx.moveTo(tx - cw*1.35, ty + ch*0.28);
      ctx.bezierCurveTo(tx - cw*1.35, ty - ch*0.08, tx - cw*0.8, ty - ch*0.48, tx, ty - ch);
      ctx.bezierCurveTo(tx + cw*0.8,  ty - ch*0.48, tx + cw*1.35, ty - ch*0.08, tx + cw*1.35, ty + ch*0.28);
      ctx.bezierCurveTo(tx + cw,      ty + ch*0.48, tx - cw,      ty + ch*0.48, tx - cw*1.35, ty + ch*0.28);
      ctx.fillStyle = c0;
      ctx.fill();

      // Keskmine kiht
      ctx.beginPath();
      ctx.moveTo(tx - cw*0.9, ty - ch*0.12);
      ctx.bezierCurveTo(tx - cw*0.9, ty - ch*0.5, tx - cw*0.48, ty - ch*0.9, tx, ty - ch*1.42);
      ctx.bezierCurveTo(tx + cw*0.48, ty - ch*0.9, tx + cw*0.9, ty - ch*0.5, tx + cw*0.9, ty - ch*0.12);
      ctx.bezierCurveTo(tx + cw*0.58, ty + ch*0.14, tx - cw*0.58, ty + ch*0.14, tx - cw*0.9, ty - ch*0.12);
      ctx.fillStyle = c1;
      ctx.fill();

      // Ülemine tipp
      ctx.beginPath();
      ctx.moveTo(tx - cw*0.48, ty - ch*0.82);
      ctx.bezierCurveTo(tx - cw*0.48, ty - ch*1.12, tx - cw*0.18, ty - ch*1.65, tx, ty - ch*2.05);
      ctx.bezierCurveTo(tx + cw*0.18, ty - ch*1.65, tx + cw*0.48, ty - ch*1.12, tx + cw*0.48, ty - ch*0.82);
      ctx.bezierCurveTo(tx + cw*0.28, ty - ch*0.62, tx - cw*0.28, ty - ch*0.62, tx - cw*0.48, ty - ch*0.82);
      ctx.fillStyle = c2;
      ctx.fill();

      ctx.restore();
    }

    // ── Puud (kõik) ───────────────────────────────────────────────
    function drawTrees(night) {
      const sorted = [...trees].sort((a, b) => a.y - b.y);
      for (const t of sorted) {
        const fn = t.type === 'spruce' ? drawSpruce
                 : t.type === 'birch'  ? drawBirch
                 : drawPine;
        fn(t.x, t.y, t.sc, t.ph, night);
      }
    }

    // ── Nurmenukud ────────────────────────────────────────────────
    function drawFlowers(night) {
      if (night) {
        // Öösel ainult siluetid
        ctx.save();
        ctx.fillStyle = 'rgba(12,28,6,0.65)';
        for (const fl of flowers) {
          for (let i = 0; i < fl.n; i++) {
            const ox = (i - fl.n / 2) * 7;
            ctx.beginPath();
            ctx.arc(fl.x + ox, fl.y - fl.sh, 2, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        ctx.restore();
        return;
      }

      for (const fl of flowers) {
        const wind = Math.sin(tick * 0.85 + fl.ph) * 3;

        for (let i = 0; i < fl.n; i++) {
          const ox = (i - fl.n / 2) * 7;
          const sw = wind + Math.sin(tick * 1.1 + fl.ph + i * 0.7) * 1.8;

          // Vars
          ctx.beginPath();
          ctx.moveTo(fl.x + ox, fl.y);
          ctx.quadraticCurveTo(
            fl.x + ox + sw * 0.45, fl.y - fl.sh * 0.55,
            fl.x + ox + sw,        fl.y - fl.sh
          );
          ctx.strokeStyle = '#3C6E1C';
          ctx.lineWidth   = 1.5;
          ctx.stroke();

          // Õis – 5 kroonlehte
          const fx = fl.x + ox + sw;
          const fy = fl.y - fl.sh;
          ctx.save();
          ctx.translate(fx, fy);
          for (let p = 0; p < 5; p++) {
            const pa = (p / 5) * Math.PI * 2;
            ctx.beginPath();
            ctx.ellipse(
              Math.cos(pa) * fl.sz * 0.9,
              Math.sin(pa) * fl.sz * 0.9,
              fl.sz * 0.62, fl.sz * 0.40, pa, 0, Math.PI * 2
            );
            ctx.fillStyle = 'rgba(255,212,0,0.88)';
            ctx.fill();
          }
          // Keskmik
          ctx.beginPath();
          ctx.arc(0, 0, fl.sz * 0.44, 0, Math.PI * 2);
          ctx.fillStyle = '#D84000';
          ctx.fill();
          ctx.restore();
        }

        // Lehtede rooset tüve ümber
        ctx.save();
        ctx.globalAlpha = 0.62;
        ctx.fillStyle   = '#2D5E10';
        ctx.beginPath();
        ctx.ellipse(fl.x - 4, fl.y - 3, 7, 3.5, -0.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(fl.x + 4, fl.y - 2, 6, 3.0,  0.45, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // ── Koidiku/hämara valgus ─────────────────────────────────────
    function drawAmbient(h, sr, ss) {
      let col = null, a = 0;
      if (h >= sr - 0.5 && h < sr + 1.5) {
        col = 'rgba(255,110,30,0.08)';
        a   = 1 - Math.abs(h - sr) / 1.5;
      } else if (h >= ss - 1.5 && h < ss + 0.5) {
        col = 'rgba(255,75,15,0.09)';
        a   = 1 - Math.abs(h - (ss - 0.5)) / 1.5;
      }
      if (!col || a <= 0) return;
      ctx.save();
      ctx.globalAlpha = clamp(a, 0, 1);
      ctx.fillStyle   = col;
      ctx.fillRect(0, HORIZON, W, H - HORIZON);
      ctx.restore();
    }

    // ── Vignjett ──────────────────────────────────────────────────
    function drawVignette() {
      const g = ctx.createRadialGradient(W/2, H*0.42, H*0.18, W/2, H*0.42, H*0.88);
      g.addColorStop(0, 'rgba(0,0,0,0)');
      g.addColorStop(1, 'rgba(0,0,0,0.24)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }

    // ── Hover / puute ─────────────────────────────────────────────
    cvs.addEventListener('mousemove',  e => { mx = e.clientX; my = e.clientY; });
    cvs.addEventListener('mouseleave', () => { mx = my = -9999; });
    cvs.addEventListener('touchstart', e => {
      const t = e.touches[0]; mx = t.clientX; my = t.clientY;
    }, {passive: true});
    cvs.addEventListener('touchend', () => {
      setTimeout(() => { mx = my = -9999; }, 3500);
    }, {passive: true});

    function updateHover(h, day, sr, ss) {
      const pos  = celestPos(day, h, sr, ss);
      const dist = Math.hypot(mx - pos.x, my - pos.y);
      const hov  = dist < 42;

      sunHov  = hov && day;
      moonHov = hov && !day;
      cvs.style.cursor = hov ? 'pointer' : 'default';

      if (hov) {
        tip.classList.add('on');
        const tx = pos.x > W * 0.58 ? pos.x - 215 : pos.x + 48;
        const ty = pos.y < 130      ? pos.y +  32  : pos.y - 145;
        tip.style.left = clamp(tx, 10, W - 225) + 'px';
        tip.style.top  = clamp(ty, 10, H - 165) + 'px';
      } else {
        tip.classList.remove('on');
      }
    }

    // ── Render loop ───────────────────────────────────────────────
    function render() {
      const h        = nowH();
      const [sr, ss] = getDL();
      const day      = h >= sr && h < ss;

      ctx.clearRect(0, 0, W, H);

      drawSky(h, sr, ss);
      drawStars(h, sr, ss);
      drawClouds(h, sr, ss);

      if (day) drawSun(h, sr, ss);
      else     drawMoon(h, sr, ss);

      drawTreeline(h, sr, ss);
      drawGround(h, sr, ss);
      drawTrees(!day);
      drawAmbient(h, sr, ss);
      drawFlowers(!day);
      drawVignette();

      updateHover(h, day, sr, ss);

      tick += 0.015;
      requestAnimationFrame(render);
    }

    resize();
    render();
  })();
  </script>
</body>
</html>
